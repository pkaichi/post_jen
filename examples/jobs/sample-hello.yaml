version: 1
id: sample-hello
name: Sample Hello Job
description: Create a sample artifact and emit a simple log
defaults:
  working_dir: /mnt/c/Users/pkaichi/workspace/postjen/postgen_proj/examples/sample-work
  timeout_sec: 30
  retry: 0
  env:
    SAMPLE_MESSAGE: hello from postgen
nodes:
  - id: write_file
    name: Write sample artifact
    program: bash
    args:
      - -lc
      - |
        printf '%s\n' "$SAMPLE_MESSAGE" > sample-output.txt
        printf 'artifact written\n'
    outputs:
      - path: sample-output.txt
        required: true
